<!DOCTYPE html>
<html>

<head>
    <title>Away - Message Feed</title>
    <style>
        body {
            font-family: monospace;
            margin: 20px;
        }

        #messages {
            border: 1px solid #ccc;
            padding: 10px;
            height: 400px;
            overflow-y: auto;
        }

        .message {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #0066cc;
        }

        .message.pending {
            opacity: 0.6;
            border-left-style: dashed;
        }

        .nick {
            font-weight: bold;
        }

        .status {
            margin-bottom: 10px;
            padding: 5px;
            border-radius: 3px;
        }

        .connected {
            background: #d4edda;
            color: #155724;
        }

        .disconnected {
            background: #f8d7da;
            color: #721c24;
        }

        #input-form {
            margin-top: 10px;
        }

        #input-field {
            width: 80%;
            padding: 8px;
            font-family: monospace;
        }

        #send-button {
            padding: 8px 16px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h1>Away - Message Feed</h1>
    <div id="status" class="status disconnected">Disconnected</div>
    <div id="messages"></div>
    <form id="input-form" onsubmit="sendMessage(event)">
        <input id="target-field" type="text" placeholder="#target" value="#test" style="width: 15%; padding: 8px; font-family: monospace;">
        <input id="input-field" type="text" placeholder="Type message..." autocomplete="off" style="width: 65%; padding: 8px; font-family: monospace;">
        <button id="send-button" type="submit">Send</button>
    </form>

    <script>
        const proto = location.protocol === "https:" ? "wss" : "ws";
        const ws = new WebSocket(`${proto}://${location.host}/ws`);
        const messagesDiv = document.getElementById('messages');
        const statusDiv = document.getElementById('status');
        const inputField = document.getElementById('input-field');
        const targetField = document.getElementById('target-field');
        const sendButton = document.getElementById('send-button');

        ws.onopen = () => {
            statusDiv.textContent = 'Connected';
            statusDiv.className = 'status connected';
            inputField.disabled = false;
            sendButton.disabled = false;
        };

        const pendingMessages = new Map();

        function addMessage(msg, isPending = false) {
            const el = document.createElement('div');
            el.className = isPending ? 'message pending' : 'message';
            const nick = msg.nick || 'me';
            el.innerHTML = `<span class="nick">${nick}</span>: ${msg.text}`;
            messagesDiv.appendChild(el);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            return el;
        }

        ws.onmessage = (event) => {
            try {
                const ev = JSON.parse(event.data);
                if (ev.type === 'message.created' || ev.type === 'dm.created') {
                    const msg = ev.payload;
                    const clientId = msg.client_id;

                    if (clientId && pendingMessages.has(clientId)) {
                        const el = pendingMessages.get(clientId);
                        el.className = 'message';
                        pendingMessages.delete(clientId);
                        // Update nick from server event
                        el.querySelector('.nick').textContent = msg.nick || 'me';
                        return;
                    }

                    addMessage(msg);
                }
            } catch (e) {
                console.error('parse error', e);
            }
        };

        ws.onclose = () => {
            statusDiv.textContent = 'Disconnected';
            statusDiv.className = 'status disconnected';
            inputField.disabled = true;
            sendButton.disabled = true;
        };

        ws.onerror = (error) => {
            console.error('websocket error', error);
        };

        function sendMessage(event) {
            event.preventDefault();
            const text = inputField.value.trim();
            const target = targetField.value.trim();
            if (!text || !target) return;

            const clientId = 'cl_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            const el = addMessage({ text, nick: 'me' }, true);
            pendingMessages.set(clientId, el);

            const command = {
                type: 'send_message',
                payload: { 
                    text,
                    client_id: clientId,
                    target: target
                }
            };

            ws.send(JSON.stringify(command));
            inputField.value = '';
        }
    </script>
</body>

</html>
