<!DOCTYPE html>
<html>

<head>
    <title>Away - Message Feed</title>
    <style>
        body {
            font-family: monospace;
            margin: 20px;
        }

        .layout {
            display: grid;
            grid-template-columns: 220px 1fr;
            gap: 12px;
            max-width: 980px;
        }

        #buffer-list {
            border: 1px solid #ccc;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-height: 400px;
        }

        .buffer-item {
            text-align: left;
            padding: 6px 8px;
            border: 1px solid #ddd;
            background: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: monospace;
        }

        .buffer-item.active {
            border-color: #0066cc;
            background: #eaf3ff;
        }

        .unread-badge {
            min-width: 16px;
            height: 16px;
            border-radius: 999px;
            padding: 0 4px;
            background: #dc3545;
            color: #fff;
            font-size: 11px;
            line-height: 16px;
            text-align: center;
        }

        #messages {
            border: 1px solid #ccc;
            padding: 10px;
            height: 400px;
            overflow-y: auto;
        }

        .message {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #0066cc;
        }

        .message.pending {
            opacity: 0.6;
            border-left-style: dashed;
        }

        .message.unconfirmed {
            border-left-color: #dc3545;
            color: #721c24;
        }

        .nick {
            font-weight: bold;
        }

        .status {
            margin-bottom: 10px;
            padding: 5px;
            border-radius: 3px;
        }

        .connected {
            background: #d4edda;
            color: #155724;
        }

        .disconnected {
            background: #f8d7da;
            color: #721c24;
        }

        .active-row {
            margin: 6px 0;
            color: #333;
        }

        #input-form {
            margin-top: 10px;
        }

        #input-field {
            width: 80%;
            padding: 8px;
            font-family: monospace;
        }

        #send-button {
            padding: 8px 16px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h1>Away - Message Feed</h1>
    <div id="status" class="status disconnected">Disconnected</div>

    <div class="layout">
        <div id="buffer-list"></div>
        <div>
            <div class="active-row">Active: <strong id="active-title">(none)</strong></div>
            <div id="messages"></div>
        </div>
    </div>

    <form id="input-form" onsubmit="sendMessage(event)">
        <input id="target-field" type="text" placeholder="#target" value="#test"
            style="width: 15%; padding: 8px; font-family: monospace;">
        <input id="input-field" type="text" placeholder="Type message..." autocomplete="off"
            style="width: 65%; padding: 8px; font-family: monospace;">
        <button id="send-button" type="submit">Send</button>
    </form>

    <script type="module" src="./app.js"></script>
</body>

</html>
